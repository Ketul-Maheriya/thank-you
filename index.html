<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Surprise For You</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root { --primary: #6366f1; --secondary: #a855f7; }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(-45deg, #ff9a9e, #fad0c4, #a1c4fd, #c2e9fb, #fbc2eb);
            background-size: 400% 400%;
            animation: gradientBG 12s ease infinite;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            margin: 0; padding: 20px; overflow-x: hidden;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 35px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            width: 100%; max-width: 450px;
            padding: 2.5rem; position: relative;
            animation: float 5s ease-in-out infinite;
        }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-15px); } }
        .cursive { font-family: 'Dancing Script', cursive; }
        .slider-container {
            position: relative; width: 100%; overflow: hidden;
            border-radius: 24px; background: white; padding: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        .slider-wrapper { display: flex; transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1); width: 100%; }
        .slide-img { min-width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 18px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #e2e8f0; transition: all 0.3s; }
        .dot.active { background: var(--primary); width: 18px; border-radius: 10px; }
        .btn-glow {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px -5px rgba(99, 102, 241, 0.4);
            color: white; font-weight: 800;
        }
        .heart-beat { animation: heartBeat 1.5s ease-in-out infinite; color: #ef4444; }
        @keyframes heartBeat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="glass-card" id="mainCard">
        <div id="step1" class="text-center">
            <div class="bg-white p-6 rounded-[2rem] inline-flex shadow-sm mb-6">
                <svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="text-indigo-500">
                    <path d="M22 17a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V9.5C2 7 4 5 6.5 5H17.5C20 5 22 7 22 9.5V17Z"></path>
                    <path d="m2 9.5 10 5 10-5"></path>
                    <path class="heart-beat" fill="currentColor" stroke="none" d="M12 13c-1-1-2.5-.5-2.5 1.5 0 1.5 2.5 3 2.5 3s2.5-1.5 2.5-3c0-2-1.5-2.5-2.5-1.5Z"></path>
                </svg>
            </div>
            <h1 class="text-3xl font-extrabold text-gray-800 mb-2">Surprise! 💌</h1>
            <p class="text-gray-500 mb-8 font-medium">Enter your name to unlock your personalized message.</p>
            
            <input type="text" id="nameInput" placeholder="Your Name..." 
                class="w-full px-6 py-4 rounded-2xl bg-white/60 border-2 border-transparent focus:border-indigo-400 focus:bg-white outline-none text-center text-xl font-bold text-gray-700 transition-all mb-6">
            
            <button onclick="revealMessage()" class="btn-glow w-full py-4 rounded-2xl text-lg uppercase tracking-wider">
                Open My Message ✨
            </button>
        </div>

        <div id="step2" class="hidden text-center">
            <h2 class="text-4xl cursive text-indigo-600 mb-1">Thank You,</h2>
            <h3 id="displayName" class="text-2xl font-black text-gray-800 mb-6 uppercase tracking-tighter"></h3>
            
            <div class="slider-container mb-6" id="sliderContainer">
                <div class="slider-wrapper" id="sliderWrapper"></div>
                <div class="flex justify-center gap-2 mt-3" id="dotContainer"></div>
            </div>

            <div class="bg-white/60 p-6 rounded-3xl border border-white shadow-sm mb-6">
                <p id="displayMessage" class="text-gray-700 leading-relaxed font-semibold italic text-lg"></p>
            </div>

            <div class="py-2 px-4 bg-indigo-100 rounded-full inline-block">
                <p class="text-[10px] text-indigo-600 uppercase tracking-widest font-bold">🔒 Private Session Locked</p>
            </div>
        </div>
    </div>

    <script>
        // --- DATA: Add your friends here ---
        const friendDatabase = {
            "mann": {
                name: "Mann Bhai",
                photos: [
                    "https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=600",
                    "https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=600"
                ],
                message: "Mann! Thanks for the wishes. You've been a great friend through this IT journey. Let's crush our next project together!"
            },
            "priya": {
                name: "Priya",
                photos: ["https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=600"],
                message: "Priya, thank you so much for the kind words! Your support always keeps me motivated."
            }
        };

        const COMMON_DATA = {
            photos: ["https://images.unsplash.com/photo-1513151233558-d860c5398176?w=600"],
            message: "Thank you so much for your kind wishes! It means the world to me. Hope you have an amazing day! ❤️"
        };

        let currentSlide = 0;
        const LOCK_KEY = 'app_user_lock_v3';

        // Check for lock on page load
        window.onload = () => {
            const savedName = localStorage.getItem(LOCK_KEY);
            if (savedName) {
                showFinalContent(savedName);
            }
        };

        function revealMessage() {
            const input = document.getElementById('nameInput');
            const name = input.value.trim();
            if (!name) return;

            // Save the lock immediately
            localStorage.setItem(LOCK_KEY, name);
            showFinalContent(name);
            
            confetti({
                particleCount: 150, spread: 70, origin: { y: 0.6 },
                colors: ['#6366f1', '#a855f7', '#ec4899']
            });
        }

        function showFinalContent(name) {
            const lowerName = name.toLowerCase();
            const data = friendDatabase[lowerName] || { name: name, ...COMMON_DATA };
            
            document.getElementById('displayName').innerText = data.name;
            document.getElementById('displayMessage').innerText = data.message;
            
            const wrapper = document.getElementById('sliderWrapper');
            const dots = document.getElementById('dotContainer');
            wrapper.innerHTML = '';
            dots.innerHTML = '';

            data.photos.forEach((url, index) => {
                const img = document.createElement('img');
                img.src = url; img.className = 'slide-img';
                wrapper.appendChild(img);

                if(data.photos.length > 1) {
                    const d = document.createElement('div');
                    d.className = `dot ${index === 0 ? 'active' : ''}`;
                    d.onclick = () => goToSlide(index);
                    dots.appendChild(d);
                }
            });

            document.getElementById('step1').classList.add('hidden');
            document.getElementById('step2').classList.remove('hidden');
            initTouch(data.photos.length);
        }

        function goToSlide(index) {
            const wrapper = document.getElementById('sliderWrapper');
            const dots = document.querySelectorAll('.dot');
            currentSlide = index;
            wrapper.style.transform = `translateX(-${index * 100}%)`;
            dots.forEach((d, i) => d.classList.toggle('active', i === index));
        }

        function initTouch(total) {
            let startX = 0;
            const container = document.getElementById('sliderContainer');
            container.addEventListener('touchstart', e => startX = e.touches[0].clientX);
            container.addEventListener('touchend', e => {
                const diff = startX - e.changedTouches[0].clientX;
                if (Math.abs(diff) > 50) {
                    let next = diff > 0 ? currentSlide + 1 : currentSlide - 1;
                    if (next >= 0 && next < total) goToSlide(next);
                }
            });
        }
    </script>
</body>
</html>
